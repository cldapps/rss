<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Phone RSS</title>
    <style>
        /* Base Styling & Variables */
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6e6e73;
            --accent: #1a1a1a;
            --focus-outline: #007aff;
            --focus-bg: #e5f1ff;
            --border: #e5e5ea;
        }

        /* Theme Mapping */
        body.theme-light {
            --bg: #fafafa; --surface: #ffffff; --text: #1a1a1a; --text-muted: #6e6e73; --border: #e5e5ea;
        }
        body.theme-dark {
            --bg: #000000; --surface: #1c1c1e; --text: #f5f5f7; --text-muted: #98989d; --border: #38383a; --focus-bg: #2c2c2e; --focus-outline: #0a84ff;
        }
        body.theme-sepia {
            --bg: #f4ecd8; --surface: #fdf6e3; --text: #433422; --text-muted: #8f7762; --border: #e4d9c4; --focus-bg: #eae0c4;
        }

        /* Typography Mapping */
        body.font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body.font-serif { font-family: "Iowan Old Style", "Apple Garamond", Baskerville, "Times New Roman", serif; }

        body.size-small { font-size: 14px; }
        body.size-medium { font-size: 16px; }
        body.size-large { font-size: 19px; }

        /* Global Reset & Layout */
        body {
            margin: 0;
            padding: 0 0 40px 0;
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
            line-height: 1.4;
        }

        .view { display: none; padding: 12px; }
        .view.active { display: block; }

        h1, h2, h3 {
            font-size: 1.2rem;
            margin: 0 0 12px 0;
            text-align: center;
            font-weight: 600;
        }
        
        .section-label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 20px 0 8px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        /* Interactive Elements & D-Pad Navigation */
        input, select, button, .clickable-item {
            font-size: inherit;
            font-family: inherit;
            color: inherit;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
            width: 100%;
            margin-bottom: 8px;
            text-align: left;
            display: block;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        button { text-align: center; font-weight: 600; }
        
        input:focus, select:focus, button:focus, .clickable-item:focus {
            outline: 2px solid var(--focus-outline);
            background-color: var(--focus-bg);
            border-color: var(--focus-outline);
        }

        /* Elegant News Cards */
        .news-card {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            border-radius: 0;
            padding: 12px 6px;
            margin-bottom: 0;
            box-shadow: none;
        }
        .news-card:last-child { border-bottom: none; }
        .news-card:focus { border-radius: 6px; }

        .news-meta {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-family: -apple-system, sans-serif; /* Keep meta sans-serif even if reading in serif */
        }
        .news-title {
            font-weight: 600;
            font-size: 1.1em;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .news-snippet {
            font-size: 0.9em;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Settings Specific */
        .toggle-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle-status {
            font-size: 0.8em;
            font-weight: bold;
            color: var(--focus-outline);
        }

        /* Full Text Reader */
        .article-content p { line-height: 1.6; margin-bottom: 1.2em; }
        .article-content img { max-width: 100%; height: auto; border-radius: 4px; }

        /* Hardware Softkey Bar */
        .softkey-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 38px;
            background: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
        }
        .softkey-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 5px;
            width: auto;
            margin: 0;
            box-shadow: none;
        }
        .softkey-center { font-size: 12px; color: #888888; font-weight: normal; }
    </style>
</head>
<body class="theme-light font-sans size-medium">

    <!-- VIEW: MIXED HOME FEED -->
    <div id="view-home" class="view active">
        <h1>Latest News</h1>
        <div id="home-list"></div>
    </div>

    <!-- VIEW: HOME OPTIONS MENU -->
    <div id="view-options" class="view">
        <h1>Options</h1>
        <button class="clickable-item" onclick="loadMixedFeed()" accesskey="1">1. Refresh All</button>
        <button class="clickable-item" onclick="switchView('channels')" accesskey="2">2. Browse Channels</button>
    </div>

    <!-- VIEW: INDIVIDUAL CHANNELS DIRECTORY -->
    <div id="view-channels" class="view">
        <h1>My Channels</h1>
        <div id="channels-list"></div>
    </div>

    <!-- VIEW: SINGLE CHANNEL HEADLINES -->
    <div id="view-headlines" class="view">
        <h1 id="headlines-title">Channel</h1>
        <div id="headlines-list"></div>
    </div>

    <!-- VIEW: FULL ARTICLE READER -->
    <div id="view-reader" class="view">
        <h1 id="reader-title" style="text-align: left; font-size: 1.4em;">Loading...</h1>
        <div class="section-label" id="reader-meta" style="margin-top: 5px;">Please wait</div>
        <div class="article-content" id="reader-content"></div>
    </div>

    <!-- VIEW: SETTINGS & FEED MANAGEMENT -->
    <div id="view-settings" class="view">
        <h1>Settings</h1>
        
        <div class="section-label">Display</div>
        <select id="setting-theme" class="clickable-item" onchange="applySettings()">
            <option value="theme-light">Light Mode</option>
            <option value="theme-dark">Dark Mode</option>
            <option value="theme-sepia">Sepia Paper</option>
        </select>
        <select id="setting-font" class="clickable-item" onchange="applySettings()">
            <option value="font-sans">Clean Sans-Serif</option>
            <option value="font-serif">Literary Serif</option>
        </select>
        <select id="setting-size" class="clickable-item" onchange="applySettings()">
            <option value="size-small">Small Text</option>
            <option value="size-medium">Standard Text</option>
            <option value="size-large">Large Text</option>
        </select>
        
        <div class="section-label">Home Feed Manager</div>
        <div id="settings-feed-toggles"></div>

        <div class="section-label">Add Custom Feed</div>
        <input type="text" id="custom-name" placeholder="Name (e.g., The Verge)">
        <input type="url" id="custom-url" placeholder="https://example.com/rss">
        <button onclick="addNewFeed()">+ Add to Channels</button>

        <button onclick="resetFeedsToDefault()" style="background:#ff3b30; color:white; border:none; margin-top:25px;">Reset All Data</button>
    </div>

    <!-- NATIVE SOFTKEY BAR -->
    <div class="softkey-bar">
        <button class="softkey-btn" id="lsk-label" onclick="handleLSKClick()">Options</button>
        <div class="softkey-center">Select</div>
        <button class="softkey-btn" id="rsk-label" onclick="handleRSKClick()">Settings</button>
    </div>

    <script>
        // Switched to allorigins.win for maximum CORS compatibility with NYT and Prothom Alo
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        
        const defaultFeeds = [
            { id: "bbc", name: "BBC News", url: "https://feeds.bbci.co.uk/news/rss.xml", enabled: true },
            { id: "nyt", name: "New York Times", url: "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml", enabled: true },
            { id: "palo", name: "Prothom Alo", url: "https://www.prothomalo.com/feed/", enabled: true },
            { id: "star", name: "The Daily Star", url: "https://www.thedailystar.net/frontpage/rss.xml", enabled: true }
        ];

        let state = {
            feeds: [],
            currentView: "home", 
            activeFeedUrl: "",
            activeArticleUrl: "",
            settings: { theme: "theme-light", font: "font-sans", size: "size-medium" }
        };

        // --- INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            setupPhysicalKeyBindings();
            loadMixedFeed(); // Start with home mixed feed
        });

        function loadSavedData() {
            const savedFeeds = localStorage.getItem('rss_feeds');
            const savedSettings = localStorage.getItem('rss_settings');
            
            state.feeds = savedFeeds ? JSON.parse(savedFeeds) : JSON.parse(JSON.stringify(defaultFeeds));
            if(savedSettings) state.settings = JSON.parse(savedSettings);
            
            document.getElementById('setting-theme').value = state.settings.theme;
            document.getElementById('setting-font').value = state.settings.font;
            document.getElementById('setting-size').value = state.settings.size;
            applySettingsToDOM();
        }

        // --- SETTINGS & STORAGE ---
        function applySettings() {
            state.settings.theme = document.getElementById('setting-theme').value;
            state.settings.font = document.getElementById('setting-font').value;
            state.settings.size = document.getElementById('setting-size').value;
            localStorage.setItem('rss_settings', JSON.stringify(state.settings));
            applySettingsToDOM();
        }

        function applySettingsToDOM() {
            document.body.className = `${state.settings.theme} ${state.settings.font} ${state.settings.size}`;
        }

        function saveFeedsToStorage() {
            localStorage.setItem('rss_feeds', JSON.stringify(state.feeds));
        }

        function resetFeedsToDefault() {
            if(confirm("Factory reset reader app? All custom feeds will be lost.")) {
                state.feeds = JSON.parse(JSON.stringify(defaultFeeds));
                saveFeedsToStorage();
                switchView('home');
                loadMixedFeed();
            }
        }

        function toggleFeedStatus(index) {
            state.feeds[index].enabled = !state.feeds[index].enabled;
            saveFeedsToStorage();
            renderSettingsFeedToggles(); // Re-render toggles
        }

        function renderSettingsFeedToggles() {
            const container = document.getElementById('settings-feed-toggles');
            container.innerHTML = "";
            state.feeds.forEach((feed, index) => {
                const btn = document.createElement('button');
                btn.className = "clickable-item toggle-btn";
                // Default enabled to true if undefined from old storage
                const isEnabled = feed.enabled !== false; 
                btn.innerHTML = `<span>${feed.name}</span> <span class="toggle-status">${isEnabled ? '[ ON ]' : '[ OFF ]'}</span>`;
                btn.onclick = () => toggleFeedStatus(index);
                container.appendChild(btn);
            });
        }

        function addNewFeed() {
            const name = document.getElementById('custom-name').value.trim();
            const url = document.getElementById('custom-url').value.trim();
            if(!name || !url) { alert("Incomplete input."); return; }
            state.feeds.push({ id: Date.now().toString(), name, url, enabled: true });
            saveFeedsToStorage();
            renderSettingsFeedToggles();
            document.getElementById('custom-name').value = "";
            document.getElementById('custom-url').value = "";
            alert("Feed Added!");
        }

        // --- ROUTING ---
        function switchView(viewName) {
            state.currentView = viewName;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            // Focus first interactive element for hardware keypad support
            const focusTarget = document.getElementById(`view-${viewName}`).querySelector('button, input, select, .clickable-item');
            if(focusTarget) focusTarget.focus();
            
            if(viewName === 'settings') renderSettingsFeedToggles();
            if(viewName === 'channels') renderChannelsList();
            
            updateSoftkeyLabels();
        }

        function formatTimeAgo(dateObj) {
            if(!dateObj || isNaN(dateObj.getTime())) return "";
            const seconds = Math.floor((new Date() - dateObj) / 1000);
            let interval = seconds / 3600;
            if (interval >= 1 && interval < 24) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval >= 1 && interval < 60) return Math.floor(interval) + "m ago";
            if (seconds < 60) return "Just now";
            return dateObj.toLocaleDateString();
        }

        // --- DATA FETCHING ---
        async function loadMixedFeed() {
            switchView('home');
            const container = document.getElementById('home-list');
            container.innerHTML = "<div style='text-align:center; padding:30px 10px; color:var(--text-muted);'>Syncing latest articles...</div>";

            const enabledFeeds = state.feeds.filter(f => f.enabled !== false);
            if(enabledFeeds.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:20px;'>All feeds disabled. Go to Settings.</div>";
                return;
            }

            let allArticles = [];

            await Promise.allSettled(enabledFeeds.map(async feed => {
                try {
                    const res = await fetch(proxyUrl + encodeURIComponent(feed.url));
                    if (!res.ok) return;
                    const text = await res.text();
                    const doc = new DOMParser().parseFromString(text, "text/xml");
                    
                    const items = doc.querySelectorAll("item, entry"); // RSS and Atom fallback
                    items.forEach(item => {
                        const title = item.querySelector("title")?.textContent || "Untitled";
                        // Handle standard link or Atom href
                        const linkNode = item.querySelector("link");
                        const link = linkNode ? (linkNode.textContent || linkNode.getAttribute("href")) : "";
                        const desc = (item.querySelector("description, summary")?.textContent || "").replace(/<\/?[^>]+(>|$)/g, "").trim();
                        
                        const dateText = item.querySelector("pubDate, updated, published")?.textContent;
                        const dateObj = dateText ? new Date(dateText) : null;
                        const timestamp = dateObj && !isNaN(dateObj.getTime()) ? dateObj.getTime() : 0;

                        allArticles.push({ title, link, desc, timestamp, dateObj, source: feed.name });
                    });
                } catch(e) { console.warn("Failed syncing: " + feed.name); }
            }));

            // Sort chronologically (newest first)
            allArticles.sort((a, b) => b.timestamp - a.timestamp);
            container.innerHTML = "";
            
            if(allArticles.length === 0) {
                container.innerHTML = "<div style='text-align:center;'>Unable to reach news servers.</div>";
                return;
            }

            // Cap at top 40 for memory efficiency on basic phones
            allArticles.slice(0, 40).forEach(article => {
                const timeStr = formatTimeAgo(article.dateObj);
                const metaText = timeStr ? `${article.source} • ${timeStr}` : article.source;
                
                const card = document.createElement('div');
                card.className = "news-card clickable-item";
                card.tabIndex = 0;
                card.innerHTML = `
                    <div class="news-meta">${metaText}</div>
                    <div class="news-title">${article.title}</div>
                    <div class="news-snippet">${article.desc.substring(0, 100)}${article.desc.length > 100 ? '...' : ''}</div>
                `;
                card.onclick = () => loadFullArticle(article.link, article.title, metaText);
                card.onkeydown = (e) => { if(e.key === 'Enter') loadFullArticle(article.link, article.title, metaText); };
                container.appendChild(card);
            });
        }

        function renderChannelsList() {
            const container = document.getElementById('channels-list');
            container.innerHTML = "";
            state.feeds.forEach(feed => {
                const btn = document.createElement('button');
                btn.className = "clickable-item";
                btn.innerText = feed.name;
                btn.onclick = () => loadSingleChannel(feed.url, feed.name);
                container.appendChild(btn);
            });
        }

        async function loadSingleChannel(url, name) {
            state.activeFeedUrl = url;
            switchView('headlines');
            document.getElementById('headlines-title').innerText = name;
            const container = document.getElementById('headlines-list');
            container.innerHTML = "<div style='text-align:center; padding:30px;'>Loading...</div>";

            try {
                const res = await fetch(proxyUrl + encodeURIComponent(url));
                const doc = new DOMParser().parseFromString(await res.text(), "text/xml");
                const items = doc.querySelectorAll("item, entry");
                
                container.innerHTML = "";
                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent || "Untitled";
                    const linkNode = item.querySelector("link");
                    const link = linkNode ? (linkNode.textContent || linkNode.getAttribute("href")) : "";
                    const dateText = item.querySelector("pubDate, updated")?.textContent;
                    const dateObj = dateText ? new Date(dateText) : null;
                    const timeStr = formatTimeAgo(dateObj);
                    
                    const card = document.createElement('div');
                    card.className = "news-card clickable-item";
                    card.tabIndex = 0;
                    card.innerHTML = `
                        <div class="news-meta">${timeStr || 'Recent'}</div>
                        <div class="news-title">${title}</div>
                    `;
                    card.onclick = () => loadFullArticle(link, title, name);
                    card.onkeydown = (e) => { if(e.key === 'Enter') loadFullArticle(link, title, name); };
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = "<div style='text-align:center; color:red;'>Stream error</div>";
            }
        }

        async function loadFullArticle(url, title, meta) {
            state.activeArticleUrl = url;
            switchView('reader');
            
            document.getElementById('reader-title').innerText = title;
            document.getElementById('reader-meta').innerText = meta || 'Article View';
            const content = document.getElementById('reader-content');
            content.innerHTML = "<div style='text-align:center; padding:40px 10px; color:var(--text-muted);'>Extracting text...</div>";

            try {
                const res = await fetch(proxyUrl + encodeURIComponent(url));
                const htmlText = await res.text();
                const doc = new DOMParser().parseFromString(htmlText, "text/html");

                const targetArea = doc.querySelector('article, main, .article-body, .story-body, .entry-content');
                let parsedHtml = "";

                if(targetArea) {
                    targetArea.querySelectorAll('p, h2, h3').forEach(n => {
                        if(n.textContent.trim().length > 10) parsedHtml += `<${n.tagName.toLowerCase()}>${n.innerHTML}</${n.tagName.toLowerCase()}>`;
                    });
                }

                if(!parsedHtml || parsedHtml.length < 200) {
                    parsedHtml = "";
                    doc.querySelectorAll('p').forEach(p => {
                        if(p.textContent.trim().length > 40) parsedHtml += `<p>${p.innerHTML}</p>`;
                    });
                }

                // Strip script tags and inline styles for safety and layout integrity
                parsedHtml = parsedHtml.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "");
                parsedHtml = parsedHtml.replace(/style="[^"]*"/gi, "");
                
                if(!parsedHtml) {
                    content.innerHTML = `<button class='clickable-item' onclick='window.open("${url}", "_blank")'>Open External Browser</button>`;
                } else {
                    content.innerHTML = parsedHtml;
                }
            } catch (err) {
                content.innerHTML = "<p>Extraction failed. Protected webpage.</p>";
            }
        }

        // --- HARDWARE NAVIGATION LOGIC ---
        function updateSoftkeyLabels() {
            const lsk = document.getElementById('lsk-label');
            const rsk = document.getElementById('rsk-label');

            if (state.currentView === "home") {
                lsk.innerText = "Options"; rsk.innerText = "Settings";
            } else if (state.currentView === "options") {
                lsk.innerText = "Select"; rsk.innerText = "Back";
            } else if (state.currentView === "channels") {
                lsk.innerText = "Select"; rsk.innerText = "Back";
            } else if (state.currentView === "headlines") {
                lsk.innerText = "Select"; rsk.innerText = "Back";
            } else if (state.currentView === "reader") {
                lsk.innerText = "External"; rsk.innerText = "Back";
            } else if (state.currentView === "settings") {
                lsk.innerText = "Save"; rsk.innerText = "Back";
            }
        }

        function handleLSKClick() {
            if (state.currentView === "home") {
                switchView('options');
            } else if (state.currentView === "options") {
                // If focus is on a button inside options, click it.
                const active = document.activeElement;
                if(active && active.tagName === 'BUTTON') active.click();
            } else if (state.currentView === "channels" || state.currentView === "headlines") {
                const active = document.activeElement;
                if(active && active.classList.contains('clickable-item')) active.click();
            } else if (state.currentView === "reader") {
                window.open(state.activeArticleUrl, '_blank');
            } else if (state.currentView === "settings") {
                applySettings();
                switchView('home');
            }
        }

        function handleRSKClick() {
            if (state.currentView === "home") {
                switchView('settings');
            } else if (state.currentView === "options") {
                switchView('home');
            } else if (state.currentView === "channels") {
                switchView('home');
            } else if (state.currentView === "headlines") {
                switchView('channels');
            } else if (state.currentView === "reader") {
                // Return to previous contextual view logically
                if(state.activeFeedUrl) switchView('headlines');
                else switchView('home');
            } else if (state.currentView === "settings") {
                switchView('home');
            }
        }

        function setupPhysicalKeyBindings() {
            window.addEventListener('keydown', (e) => {
                // Physical LSK / RSK bindings common on KaiOS / Cloud Phones
                if (e.key === 'SoftLeft' || e.key === 'F1' || e.keyCode === 118) {
                    e.preventDefault(); handleLSKClick();
                }
                if (e.key === 'SoftRight' || e.key === 'F2' || e.keyCode === 119) {
                    e.preventDefault(); handleRSKClick();
                }
                
                // Shortcut Keys from Prompt (1 and 2 mapped to Home/Options state)
                if (state.currentView === 'home' || state.currentView === 'options') {
                    if (e.key === '1') { e.preventDefault(); loadMixedFeed(); }
                    if (e.key === '2') { e.preventDefault(); switchView('channels'); }
                }
            });
        }
    </script>
</body>
</html>
