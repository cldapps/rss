<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
    <title>Cloud Phone RSS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Noto+Sans+Bengali:wght@400;600&family=Open+Sans:wght@400;600&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:#fafafa; --surface:#ffffff; --text:#1a1a1a;
            --text-muted:#6e6e73; --focus-bg:rgba(0,0,0,0.45);
            --focus-text:#ffffff; --border:#e5e5ea;
            --badge-live-bg:#d4edda; --badge-live-c:#155724;
            --badge-arc-bg:#fff3cd;  --badge-arc-c:#856404;
            --badge-rss-bg:#cce5ff;  --badge-rss-c:#004085;
            --badge-fail-bg:#f8d7da; --badge-fail-c:#721c24;
        }
        body.theme-dark       { --bg:#000; --surface:#111; --text:#eee; --text-muted:#888; --border:#2a2a2a; --focus-bg:rgba(255,255,255,0.22); --focus-text:#fff; }
        body.theme-sepia      { --bg:#f4ecd8; --surface:#fdf6e3; --text:#433422; --text-muted:#8f7762; --border:#e4d9c4; --focus-bg:rgba(208,144,80,0.6); --focus-text:#fff; }
        body.theme-sepia-dark { --bg:#2b2113; --surface:#352a1a; --text:#e8d8b8; --text-muted:#a8916a; --border:#4a3820; --focus-bg:rgba(180,120,50,0.55); --focus-text:#fff; --badge-live-bg:#1a3320; --badge-live-c:#6dc88a; --badge-arc-bg:#3a2e00; --badge-arc-c:#d4a800; --badge-rss-bg:#001e3a; --badge-rss-c:#5fa8e8; --badge-fail-bg:#3a0a0a; --badge-fail-c:#e88a8a; }
        body.theme-amoled     { --bg:#000; --surface:#000; --text:#fff; --text-muted:#666; --border:#1a1a1a; --focus-bg:rgba(255,255,255,0.15); --focus-text:#fff; }
        body.theme-green      { --bg:#0d1f0d; --surface:#112211; --text:#b8f0b8; --text-muted:#5a8a5a; --border:#1e3a1e; --focus-bg:rgba(80,200,80,0.3); --focus-text:#c8ffc8; }

        body.font-sans  { font-family:"Open Sans",-apple-system,sans-serif; }
        body.font-noto  { font-family:"Noto Sans Bengali",sans-serif; }
        body.font-hind  { font-family:"Hind Siliguri",sans-serif; }
        body.font-tiro  { font-family:"Tiro Bangla",serif; }

        body.size-small  { font-size:11px; }
        body.size-medium { font-size:12.5px; }
        body.size-large  { font-size:15px; }

        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        html,body{margin:0;padding:0;width:100%;height:100%;background:var(--bg);color:var(--text);overflow:hidden;}
        #app{display:flex;flex-direction:column;height:100vh;position:relative;}

        .view{display:none;flex:1;overflow-y:auto;padding:0;scrollbar-width:none;overscroll-behavior:contain;}
        .view::-webkit-scrollbar{display:none;}
        .view.active{display:block;}

        .padded-view{padding:8px;}
        .section-label{font-size:10px;text-transform:uppercase;color:var(--text-muted);margin:12px 0 4px 0;border-bottom:1px solid var(--border);padding-bottom:2px;letter-spacing:.06em;}

        .clickable-item,input,select,button{
            display:flex;align-items:center;width:100%;
            padding:8px 6px;border:none;border-bottom:1px solid var(--border);
            background:transparent;color:var(--text);
            font-size:inherit;font-family:inherit;
            text-align:left;cursor:pointer;outline:none;margin:0;border-radius:0;
            transition:background .08s;
        }
        input,select{border:1px solid var(--border);padding:6px;margin-bottom:6px;background:var(--surface);}
        .clickable-item:focus,input:focus,select:focus,button:focus{
            background-color:var(--focus-bg);color:var(--focus-text);border-color:transparent;
        }

        /* Home feed cards */
        .news-card-content{display:flex;gap:8px;width:100%;align-items:center;justify-content:space-between;}
        .news-thumbnail{width:38px;height:38px;border-radius:3px;object-fit:cover;background:var(--border);flex-shrink:0;}
        .news-card-text{flex:1;overflow:hidden;text-align:left;}
        .news-title{font-weight:600;font-size:12px;line-height:1.3;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;}
        .news-meta{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .clickable-item:focus .news-meta{color:rgba(255,255,255,0.75);}
        .clickable-item:focus .cache-tick{color:#fff!important;}

        /* Reader */
        #view-reader{padding:10px 8px;user-select:text;-webkit-user-select:text;}
        #reader-title{font-size:15px;font-weight:bold;margin:0 0 4px 0;line-height:1.3;}
        #reader-meta{font-size:11px;color:var(--text-muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
        .article-content p{line-height:1.65;margin-bottom:1em;}
        .article-content img{max-width:100%;height:auto;border-radius:4px;margin:8px 0;display:block;}
        .article-content h2,.article-content h3,.article-content h4{line-height:1.3;margin:1em 0 .4em;}

        /* Source badges */
        .src-badge{display:inline-block;font-size:9px;padding:1px 4px;border-radius:2px;margin-left:4px;vertical-align:middle;}
        .src-live   {background:var(--badge-live-bg);color:var(--badge-live-c);}
        .src-archive{background:var(--badge-arc-bg);color:var(--badge-arc-c);}
        .src-rss    {background:var(--badge-rss-bg);color:var(--badge-rss-c);}
        .src-fail   {background:var(--badge-fail-bg);color:var(--badge-fail-c);}

        /* Refresh spinner inside reader */
        .reader-loading{text-align:center;padding:24px 0;font-size:11px;color:var(--text-muted);}

        /* Options overlay — fully themed */
        #options-overlay{
            display:none;position:absolute;top:0;left:0;right:0;bottom:28px;
            background:var(--bg);z-index:500;flex-direction:column;
            border-top:2px solid var(--border);
        }
        #options-overlay.active{display:flex;}
        #options-overlay .opt-hint{
            font-size:9px;text-transform:uppercase;letter-spacing:.07em;
            color:var(--text-muted);padding:6px 6px 2px;border-bottom:1px solid var(--border);
        }
        #options-overlay .clickable-item:focus .opt-key{color:var(--focus-text);opacity:.7;}
        .opt-key{font-size:10px;color:var(--text-muted);margin-right:8px;min-width:12px;}

        .softkey-bar{
            height:28px;background:#1a1a1a;color:#fff;
            display:flex;justify-content:space-between;align-items:center;
            padding:0 4px;font-family:"Open Sans",sans-serif;
            font-size:11px;font-weight:600;flex-shrink:0;z-index:1000;
        }
        .softkey-btn{background:transparent;border:none;color:white;padding:0 4px;margin:0;width:auto;font-size:11px;}
        .softkey-center{font-size:11px;color:#ccc;font-weight:bold;text-transform:uppercase;}

        #sync-status{font-size:10px;text-align:center;color:var(--text-muted);padding:4px;display:none;font-weight:bold;background:var(--surface);border-bottom:1px solid var(--border);}
        .empty-state{text-align:center;padding:30px 10px;font-size:12px;color:var(--text-muted);}

        /* Feed visibility dot */
        .vis-indicator{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:6px;}
        .vis-on {background:#34c759;}
        .vis-off{background:#8e8e93;}
    </style>
</head>
<body class="theme-light font-sans size-medium">
<div id="app">

    <div id="view-home" class="view active">
        <div id="sync-status">Syncing feeds…</div>
        <div id="home-list"></div>
    </div>

    <div id="view-channels" class="view">
        <div id="channels-list"></div>
    </div>

    <div id="view-headlines" class="view">
        <div id="headlines-list"></div>
    </div>

    <div id="view-reader" class="view">
        <div id="reader-title">Loading…</div>
        <div id="reader-meta">Please wait</div>
        <div class="article-content" id="reader-content"></div>
    </div>

    <div id="view-settings" class="view padded-view">
        <div class="section-label">Typography &amp; Display</div>
        <select id="setting-font" class="clickable-item" onchange="applySettings()">
            <option value="font-sans">Open Sans (EN)</option>
            <option value="font-noto">Noto Sans Bengali</option>
            <option value="font-hind">Hind Siliguri</option>
            <option value="font-tiro">Tiro Bangla (Serif)</option>
        </select>
        <select id="setting-theme" class="clickable-item" onchange="applySettings()">
            <option value="theme-light">Light</option>
            <option value="theme-dark">Dark</option>
            <option value="theme-sepia">Sepia</option>
            <option value="theme-sepia-dark">Sepia Dark</option>
            <option value="theme-amoled">AMOLED Black</option>
            <option value="theme-green">Terminal Green</option>
        </select>
        <select id="setting-size" class="clickable-item" onchange="applySettings()">
            <option value="size-small">Small Text</option>
            <option value="size-medium">Medium Text</option>
            <option value="size-large">Large Text</option>
        </select>

        <div class="section-label">Feeds — Home Visibility</div>
        <div id="settings-feed-toggles"></div>

        <div class="section-label">System</div>
        <button class="clickable-item" onclick="resetApp()" style="color:#ff3b30;font-weight:bold;justify-content:center;">Wipe Cache &amp; Reset</button>
    </div>

    <div id="options-overlay">
        <div class="opt-hint">Options</div>
        <button class="clickable-item" onclick="closeOptions();forceRefresh();"><span class="opt-key">↺</span>Force Refresh</button>
        <button class="clickable-item" onclick="closeOptions();switchView('channels');"><span class="opt-key">≡</span>Browse Channels</button>
        <button class="clickable-item" onclick="closeOptions();switchView('settings');"><span class="opt-key">⚙</span>Settings</button>
    </div>

    <div class="softkey-bar">
        <span class="softkey-btn" id="lsk-label">Options</span>
        <div class="softkey-center" id="csk-label">Select</div>
        <span class="softkey-btn" id="rsk-label">Exit</span>
    </div>
</div>

<script>
"use strict";

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const THREE_DAYS_MS  = 3 * 24 * 60 * 60 * 1000;
const PREFETCH_DELAY = 1800; // ms between prefetch attempts
const CACHE_PREFIX   = 'rss_article_';

// ── PROXY LIST ────────────────────────────────────────────────────────────────
const PROXY_LIST = [
    u => fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(u), {cache:"no-store"}),
    u => fetch("https://corsproxy.io/?" + encodeURIComponent(u)),
    u => fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u)),
];

// ── PER-DOMAIN EXTRACTION CONFIG ─────────────────────────────────────────────
// Maps hostname substrings → extraction hints
const DOMAIN_CONFIG = {
    "prothomalo.com": {
        archiveFirst: true,
        selectors: ['article', '.story-element', '[class*="StoryDetails"]', '[class*="article-body"]', 'main'],
        thumbSelectors: ['meta[property="og:image"]']
    },
    "thedailystar.net": {
        archiveFirst: false,
        selectors: ['.rich-text', '.article-body', '[class*="content-body"]', 'article', 'main'],
        thumbSelectors: ['.section-related img', 'article img', '.featured-img img', 'meta[property="og:image"]'],
        preferOG: true   // try OG image tag first for thumbnail
    },
    "nytimes.com": {
        archiveFirst: false,
        selectors: ['[class*="StoryBodyCompanionColumn"]', '[data-testid="article-body"]', 'section[name="articleBody"]', 'article', 'main'],
        thumbSelectors: ['meta[property="og:image"]'],
        preferOG: true
    },
    "bbci.co.uk": {
        archiveFirst: false,
        selectors: ['[data-component="text-block"]', 'article', '.article-body', 'main'],
        thumbSelectors: ['meta[property="og:image"]'],
        preferOG: true
    },
    "bbc.co.uk": {
        archiveFirst: false,
        selectors: ['[data-component="text-block"]', 'article', '.article-body', 'main'],
        thumbSelectors: ['meta[property="og:image"]'],
        preferOG: true
    },
    "bbc.com": {
        archiveFirst: false,
        selectors: ['[data-component="text-block"]', 'article', '.article-body', 'main'],
        thumbSelectors: ['meta[property="og:image"]'],
        preferOG: true
    }
};

// Generic fallback selectors
const GENERIC_SELECTORS = [
    'article',
    '[class*="article-body"]','[class*="story-body"]','[class*="ArticleBody"]',
    '[class*="article__body"]','[class*="content-body"]','[class*="entry-content"]',
    '[itemprop="articleBody"]','main'
];

// ── DEFAULTS ──────────────────────────────────────────────────────────────────
const defaultFeeds = [
    { id:"bbc",  name:"BBC News",       url:"https://feeds.bbci.co.uk/news/rss.xml",                     enabled:true, visible:true },
    { id:"nyt",  name:"New York Times", url:"https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml", enabled:true, visible:true },
    { id:"palo", name:"Prothom Alo",    url:"https://www.prothomalo.com/feed/",                          enabled:true, visible:true },
    { id:"star", name:"Daily Star",     url:"https://www.thedailystar.net/frontpage/rss.xml",            enabled:true, visible:true },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
    feeds: [],
    currentView: "home",
    navHistory: [],          // for proper back navigation
    activeArticleUrl: "",
    activeArticleFeedName: "",
    optionsOpen: false,
    settings: { theme:"theme-light", font:"font-sans", size:"size-medium" }
};

let prefetchQueue   = [];
let isPrefetching   = false;
let prefetchTimer   = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    cleanupCache();
    loadSavedData();
    setupKeyBindings();
    loadMixedFeed();
});

// ── CACHE UTILS ───────────────────────────────────────────────────────────────
function safeSetItem(key, val) {
    try { localStorage.setItem(key, val); }
    catch(e) {
        if (e.name === 'QuotaExceededError') {
            cleanupCache(true);
            try { localStorage.setItem(key, val); } catch(_) {}
        }
    }
}
function cleanupCache(aggressive = false) {
    const now = Date.now(), remove = [];
    for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(CACHE_PREFIX)) {
            try {
                const item = JSON.parse(localStorage.getItem(k));
                if (now - item.timestamp > (aggressive ? 86400000 : THREE_DAYS_MS)) remove.push(k);
            } catch(_) { remove.push(k); }
        }
    }
    remove.forEach(k => localStorage.removeItem(k));
}

// ── PERSISTED DATA ────────────────────────────────────────────────────────────
function loadSavedData() {
    const sf = localStorage.getItem('rss_feeds_cfg');
    const ss = localStorage.getItem('rss_settings');
    if (sf) {
        const saved = JSON.parse(sf);
        // Merge defaults to pick up new feeds/fields without losing user config
        const byId = Object.fromEntries(saved.map(f => [f.id, f]));
        state.feeds = defaultFeeds.map(d => ({ ...d, ...(byId[d.id] || {}) }));
        // Append any user-added feeds that aren't in defaults
        saved.forEach(f => { if (!defaultFeeds.find(d => d.id === f.id)) state.feeds.push(f); });
    } else {
        state.feeds = JSON.parse(JSON.stringify(defaultFeeds));
    }
    if (ss) state.settings = { ...state.settings, ...JSON.parse(ss) };
    applySettingsToDOM();
}

// ── DOMAIN HELPERS ────────────────────────────────────────────────────────────
function getDomainConfig(url) {
    try {
        const host = new URL(url).hostname;
        for (const key of Object.keys(DOMAIN_CONFIG)) {
            if (host.includes(key)) return DOMAIN_CONFIG[key];
        }
    } catch(_) {}
    return null;
}

// ── NETWORK ───────────────────────────────────────────────────────────────────
async function tryArchive(url) {
    const archiveUrl = "https://archive.ph/newest/" + encodeURIComponent(url);
    for (const proxy of PROXY_LIST) {
        try {
            const res = await proxy(archiveUrl);
            if (res.ok) {
                const text = await res.text();
                if (text.length > 500) return text;
            }
        } catch(_) {}
    }
    return null;
}

async function fetchViaProxy(url) {
    for (const proxy of PROXY_LIST) {
        try {
            const res  = await proxy(url);
            if (res.ok) {
                const text = await res.text();
                if (text.length > 200) return text;
            }
        } catch(_) {}
    }
    return null;
}

// ── THUMBNAIL EXTRACTION ──────────────────────────────────────────────────────
function extractThumbnail(doc, baseUrl, domainCfg) {
    // 1. OG image (most reliable for all sites)
    const og = doc.querySelector('meta[property="og:image"]');
    if (og && og.content) return resolveUrl(og.content, baseUrl);

    // 2. Domain-specific thumb selectors
    if (domainCfg && domainCfg.thumbSelectors) {
        for (const sel of domainCfg.thumbSelectors) {
            const el = doc.querySelector(sel);
            if (!el) continue;
            const src = el.getAttribute('src') || el.getAttribute('data-src') || el.getAttribute('data-lazy-src') || el.content;
            if (src && isValidImgSrc(src)) return resolveUrl(src, baseUrl);
        }
    }

    // 3. First content image
    const imgs = doc.querySelectorAll('article img, main img, .content img');
    for (const img of imgs) {
        const src = img.getAttribute('src') || img.getAttribute('data-src') || img.getAttribute('data-lazy-src');
        if (src && isValidImgSrc(src)) return resolveUrl(src, baseUrl);
    }

    return null;
}

function isValidImgSrc(src) {
    return src && !src.startsWith('data:') && !src.includes('.svg') && src.length > 10;
}

function resolveUrl(src, base) {
    try {
        if (src.startsWith('//')) return 'https:' + src;
        if (src.startsWith('/'))  return new URL(src, base).href;
        return src;
    } catch(_) { return src; }
}

// ── ARTICLE EXTRACTION ────────────────────────────────────────────────────────
async function extractArticle(url, rssSummary = "") {
    const domainCfg = getDomainConfig(url);

    let rawHtml   = null;
    let sourceLabel = "live";

    // For blocked domains, try archive first
    if (domainCfg && domainCfg.archiveFirst) {
        rawHtml = await tryArchive(url);
        if (rawHtml) sourceLabel = "archive";
    }

    if (!rawHtml) {
        rawHtml = await fetchViaProxy(url);
        sourceLabel = "live";
    }

    if (rawHtml && rawHtml.length > 300) {
        const doc  = new DOMParser().parseFromString(rawHtml, "text/html");
        // Fix relative links on OG tags etc.
        try { doc.querySelector('base') || Object.assign(doc.createElement('base'), { href: url, ownerDocument: doc }); } catch(_) {}

        const selectors = (domainCfg && domainCfg.selectors) ? domainCfg.selectors : GENERIC_SELECTORS;
        let root = null;
        for (const sel of selectors) {
            root = doc.querySelector(sel);
            if (root) break;
        }
        root = root || doc.body;

        // Build article HTML
        const frag = [];
        root.querySelectorAll('p, h2, h3, h4, img, blockquote').forEach(n => {
            if (n.tagName === 'IMG') {
                let src = n.getAttribute('src') || n.getAttribute('data-src') || n.getAttribute('data-lazy-src') || n.getAttribute('data-original');
                if (isValidImgSrc(src)) {
                    src = resolveUrl(src, url);
                    frag.push(`<img src="${src}" loading="lazy" alt="">`);
                }
            } else {
                const txt = n.textContent.trim();
                if (txt.length > 30) {
                    const tag = n.tagName.toLowerCase();
                    // Strip classes/styles but keep basic structure
                    const inner = n.innerHTML
                        .replace(/\s*style="[^"]*"/gi, '')
                        .replace(/\s*class="[^"]*"/gi, '');
                    frag.push(`<${tag}>${inner}</${tag}>`);
                }
            }
        });

        // Strip scripts
        let parsed = frag.join('')
            .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');

        if (parsed.length > 200) return { html: parsed, source: sourceLabel };
    }

    // Fallback: RSS summary
    if (rssSummary && rssSummary.length > 80) {
        return {
            html: `<p>${rssSummary}</p><p style="font-style:italic;font-size:0.9em;color:var(--text-muted);">Full article may require subscription. Press CENTER to open in browser.</p>`,
            source: "rss"
        };
    }

    return {
        html: `<p style="color:var(--text-muted);font-style:italic;">Could not retrieve article content. Press CENTER to open in browser.</p>`,
        source: "fail"
    };
}

// ── VIEWS & NAVIGATION ────────────────────────────────────────────────────────
function switchView(viewName, pushHistory = true) {
    if (state.optionsOpen) closeOptions();
    if (pushHistory && state.currentView !== viewName) {
        state.navHistory.push(state.currentView);
    }
    state.currentView = viewName;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + viewName).classList.add('active');
    if (viewName === 'settings') renderSettingsFeedToggles();
    if (viewName === 'channels') renderChannelsList();
    updateSoftkeyLabels();
    requestAnimationFrame(() => {
        const av = document.getElementById('view-' + viewName);
        const f  = av && av.querySelector('.clickable-item,input,select');
        if (f) { f.focus(); f.scrollIntoView({ block: 'nearest' }); }
    });
}

function goBack() {
    if (state.navHistory.length) {
        const prev = state.navHistory.pop();
        switchView(prev, false);
    } else {
        // Try to close app or go home
        if (state.currentView !== 'home') switchView('home', false);
        else window.close();
    }
}

function updateSoftkeyLabels() {
    if (state.optionsOpen) return;
    const map = {
        home:      ['Options', 'OPEN',     'Exit'],
        channels:  ['Options', 'OPEN',     'Back'],
        headlines: ['Options', 'OPEN',     'Back'],
        reader:    ['Refresh', 'EXTERNAL', 'Back'],
        settings:  ['Save',    'EDIT',     'Back']
    };
    const l = map[state.currentView] || ['Options', 'SELECT', 'Back'];
    document.getElementById('lsk-label').innerText = l[0];
    document.getElementById('csk-label').innerText = l[1];
    document.getElementById('rsk-label').innerText = l[2];
}

// ── OPTIONS OVERLAY ───────────────────────────────────────────────────────────
function openOptions() {
    state.optionsOpen = true;
    document.getElementById('options-overlay').classList.add('active');
    document.getElementById('lsk-label').innerText = 'Select';
    document.getElementById('rsk-label').innerText = 'Close';
    requestAnimationFrame(() => {
        const f = document.querySelector('#options-overlay .clickable-item');
        if (f) f.focus();
    });
}
function closeOptions() {
    state.optionsOpen = false;
    document.getElementById('options-overlay').classList.remove('active');
    updateSoftkeyLabels();
    requestAnimationFrame(() => {
        const av = document.getElementById('view-' + state.currentView);
        const f  = av && av.querySelector('.clickable-item,input,select');
        if (f) f.focus();
    });
}

// ── CHANNELS ──────────────────────────────────────────────────────────────────
function renderChannelsList() {
    const c = document.getElementById('channels-list');
    c.innerHTML = '';
    if (!state.feeds.length) { c.innerHTML = "<div class='empty-state'>No channels.</div>"; return; }

    const visibleFeeds = state.feeds.filter(f => f.enabled !== false);
    if (!visibleFeeds.length) { c.innerHTML = "<div class='empty-state'>All feeds disabled.</div>"; return; }

    visibleFeeds.forEach((feed) => {
        const btn = document.createElement('button');
        btn.className = 'clickable-item';
        btn.innerHTML = `<div style="flex:1;font-weight:600;">${escHtml(feed.name)}</div>`;
        btn.onclick = () => openChannelHeadlines(feed);
        c.appendChild(btn);
    });
}

function openChannelHeadlines(feed) {
    state.activeArticleFeedName = feed.name;
    const c = document.getElementById('headlines-list');
    const cached = JSON.parse(localStorage.getItem('rss_feed_cache') || '[]');
    const arts   = cached.filter(a => a.source === feed.name);
    if (arts.length) renderArticles(arts, c, true);
    else c.innerHTML = "<div class='empty-state'>No cached articles. Force Refresh from Options.</div>";
    switchView('headlines');
}

// ── FEED LOADING ──────────────────────────────────────────────────────────────
function forceRefresh() {
    localStorage.removeItem('rss_feed_cache');
    loadMixedFeed();
}

async function loadMixedFeed() {
    switchView('home', false);
    state.navHistory = []; // clear history on home
    const container  = document.getElementById('home-list');
    const syncStatus = document.getElementById('sync-status');

    let cachedFeeds  = JSON.parse(localStorage.getItem('rss_feed_cache') || '[]');
    cachedFeeds      = cachedFeeds.filter(a => Date.now() - a.timestamp < THREE_DAYS_MS);

    // Show visible-feed-filtered articles from cache immediately
    const visibleNames = new Set(state.feeds.filter(f => f.enabled !== false && f.visible !== false).map(f => f.name));
    const visibleCached = cachedFeeds.filter(a => visibleNames.has(a.source));

    if (visibleCached.length) {
        renderArticles(visibleCached, container, false);
        syncStatus.style.display = 'block';
    } else {
        container.innerHTML = "<div class='empty-state'>Syncing latest news…</div>";
    }

    const enabled = state.feeds.filter(f => f.enabled !== false);
    if (!enabled.length) {
        container.innerHTML = "<div class='empty-state'>All feeds disabled.</div>";
        syncStatus.style.display = 'none';
        return;
    }

    // Fetch all feeds in parallel
    const newArticles = [];
    await Promise.allSettled(enabled.map(feed => fetchFeed(feed, newArticles)));

    syncStatus.style.display = 'none';

    if (newArticles.length) {
        const merged = [...newArticles, ...cachedFeeds];
        const unique = Array.from(new Map(merged.map(i => [i.link, i])).values());
        unique.sort((a, b) => b.timestamp - a.timestamp);
        const final = unique.slice(0, 80);
        safeSetItem('rss_feed_cache', JSON.stringify(final));
        if (state.currentView === 'home') {
            const vis = final.filter(a => visibleNames.has(a.source));
            renderArticles(vis, container, false);
        }
        schedulePrefetch(final.slice(0, 20));
    } else if (!cachedFeeds.length) {
        container.innerHTML = "<div class='empty-state' style='color:#e33;'>Offline or all feeds blocked.</div>";
    }
}

async function fetchFeed(feed, collector) {
    // Method 1: rss2json
    try {
        const res  = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&api_key=&count=25`);
        const data = await res.json();
        if (data.status === 'ok') {
            data.items.forEach(item => {
                // Better thumbnail extraction from rss2json
                let thumb = item.thumbnail;
                if (!thumb && item.enclosure && item.enclosure.link && item.enclosure.type && item.enclosure.type.startsWith('image')) {
                    thumb = item.enclosure.link;
                }
                if (!thumb) {
                    // Try to extract first image from content/description HTML
                    const match = (item.content || item.description || '').match(/<img[^>]+src=["']([^"']+)["']/i);
                    if (match) thumb = match[1];
                }
                collector.push({
                    title: item.title,
                    link: item.link,
                    source: feed.name,
                    desc: stripHtml(item.description || item.content || '').slice(0, 400),
                    timestamp: new Date(item.pubDate).getTime() || Date.now(),
                    thumbnail: thumb || null
                });
            });
            return;
        }
    } catch(_) {}

    // Method 2: direct XML proxy
    try {
        const text = await fetchViaProxy(feed.url);
        if (!text) return;
        const doc  = new DOMParser().parseFromString(text, 'text/xml');
        doc.querySelectorAll('item, entry').forEach(item => {
            const title    = item.querySelector('title')?.textContent || 'Untitled';
            const linkNode = item.querySelector('link');
            const link     = linkNode ? (linkNode.textContent.trim() || linkNode.getAttribute('href') || '') : '';
            const dateText = item.querySelector('pubDate,updated,published')?.textContent;
            let   thumb    = item.querySelector('thumbnail,enclosure[type^="image"]')?.getAttribute('url') || null;
            if (!thumb) {
                const mediaContent = item.querySelector('content');
                if (mediaContent && mediaContent.getAttribute('medium') === 'image') thumb = mediaContent.getAttribute('url');
            }
            const descRaw  = item.querySelector('description,summary')?.textContent || '';
            if (!thumb) {
                const match = descRaw.match(/<img[^>]+src=["']([^"']+)["']/i);
                if (match) thumb = match[1];
            }
            collector.push({
                title, link, source: feed.name,
                thumbnail: thumb,
                desc: stripHtml(descRaw).slice(0, 400),
                timestamp: dateText ? new Date(dateText).getTime() : Date.now()
            });
        });
    } catch(_) {}
}

function stripHtml(html) {
    return html.replace(/<\/?[^>]+(>|$)/g, '').replace(/\s+/g, ' ').trim();
}

// ── ARTICLE CARDS ─────────────────────────────────────────────────────────────
function renderArticles(articles, container, hideSource = false) {
    // Use document fragment for performance
    const frag = document.createDocumentFragment();
    articles.forEach(article => {
        const timeStr = formatTimeAgo(article.timestamp);
        const meta    = hideSource ? timeStr : (timeStr ? `${article.source} · ${timeStr}` : article.source);
        const isLoaded = !!localStorage.getItem(CACHE_PREFIX + article.link);
        const card  = document.createElement('button');
        card.className = 'clickable-item';
        card.setAttribute('data-url', article.link);

        const thumbHtml = article.thumbnail
            ? `<img src="${article.thumbnail}" class="news-thumbnail" loading="lazy" onerror="this.style.display='none'">`
            : `<div class="news-thumbnail" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(128,128,128,0.4);">TXT</div>`;

        card.innerHTML = `<div class="news-card-content">
            <div class="news-card-text">
                <div class="news-title">${escHtml(article.title)}</div>
                <div class="news-meta">${escHtml(meta)}<span class="cache-tick" data-url="${encodeURIComponent(article.link)}" style="opacity:.6;font-weight:bold;margin-left:4px;${isLoaded?'':'display:none'}">✓</span></div>
            </div>
            ${thumbHtml}
        </div>`;
        card.onclick = () => loadFullArticle(article.link, article.title, meta, article.desc);
        frag.appendChild(card);
    });
    container.innerHTML = '';
    container.appendChild(frag);
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PREFETCH ──────────────────────────────────────────────────────────────────
function schedulePrefetch(articles) {
    const urls = articles
        .filter(a => a.link && !localStorage.getItem(CACHE_PREFIX + a.link))
        .map(a => a.link);
    prefetchQueue = [...new Set([...prefetchQueue, ...urls])];
    if (!isPrefetching) processPrefetchQueue();
}

async function processPrefetchQueue() {
    if (!prefetchQueue.length) { isPrefetching = false; return; }
    isPrefetching = true;
    const url = prefetchQueue.shift();
    if (url && !localStorage.getItem(CACHE_PREFIX + url)) {
        const cached = JSON.parse(localStorage.getItem('rss_feed_cache') || '[]');
        const match  = cached.find(a => a.link === url);
        try {
            const { html, source } = await extractArticle(url, match ? match.desc : '');
            safeSetItem(CACHE_PREFIX + url, JSON.stringify({ content: html, source, timestamp: Date.now() }));
            // Update tick marks without re-rendering
            document.querySelectorAll(`.cache-tick[data-url="${encodeURIComponent(url)}"]`)
                .forEach(t => { t.style.display = 'inline'; });
        } catch(_) {}
    }
    prefetchTimer = setTimeout(processPrefetchQueue, PREFETCH_DELAY);
}

// ── READER ────────────────────────────────────────────────────────────────────
async function loadFullArticle(url, title, meta, rssSummary = '') {
    state.activeArticleUrl = url;
    switchView('reader');
    document.getElementById('reader-title').innerText   = title;
    document.getElementById('reader-meta').innerText    = meta || '';
    const content = document.getElementById('reader-content');

    const cached = localStorage.getItem(CACHE_PREFIX + url);
    if (cached) {
        const d = JSON.parse(cached);
        content.innerHTML = d.content + sourceBadgeHtml(d.source);
        return;
    }

    content.innerHTML = "<div class='reader-loading'>Loading article…</div>";
    try {
        const { html, source } = await extractArticle(url, rssSummary);
        content.innerHTML = html + sourceBadgeHtml(source);
        safeSetItem(CACHE_PREFIX + url, JSON.stringify({ content: html, source, timestamp: Date.now() }));
        document.querySelectorAll(`.cache-tick[data-url="${encodeURIComponent(url)}"]`)
            .forEach(t => { t.style.display = 'inline'; });
    } catch(_) {
        content.innerHTML = `<p style="color:var(--text-muted);">${escHtml(rssSummary || 'Failed to load.')}</p>` + sourceBadgeHtml('fail');
    }
}

async function refreshCurrentArticle() {
    const url = state.activeArticleUrl;
    if (!url) return;
    // Delete cache and reload
    localStorage.removeItem(CACHE_PREFIX + url);
    const cached = JSON.parse(localStorage.getItem('rss_feed_cache') || '[]');
    const match  = cached.find(a => a.link === url);
    const title  = document.getElementById('reader-title').innerText;
    const meta   = document.getElementById('reader-meta').innerText;
    await loadFullArticle(url, title, meta, match ? match.desc : '');
}

function sourceBadgeHtml(source) {
    const map = {
        live:    ['Live',        'src-live'],
        archive: ['Archive',     'src-archive'],
        rss:     ['RSS Summary', 'src-rss'],
        fail:    ['Failed',      'src-fail']
    };
    const [label, cls] = map[source] || ['?', 'src-fail'];
    return `<p style="margin-top:16px;"><span class="src-badge ${cls}">${label}</span></p>`;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function applySettings() {
    state.settings.theme = document.getElementById('setting-theme').value;
    state.settings.size  = document.getElementById('setting-size').value;
    state.settings.font  = document.getElementById('setting-font').value;
    localStorage.setItem('rss_settings', JSON.stringify(state.settings));
    applySettingsToDOM();
}
function applySettingsToDOM() {
    document.getElementById('setting-theme').value = state.settings.theme;
    document.getElementById('setting-size').value  = state.settings.size;
    document.getElementById('setting-font').value  = state.settings.font;
    document.body.className = `${state.settings.theme} ${state.settings.font} ${state.settings.size}`;
}

function renderSettingsFeedToggles() {
    const c = document.getElementById('settings-feed-toggles');
    c.innerHTML = '';
    state.feeds.forEach((feed, i) => {
        const isEnabled = feed.enabled !== false;
        const isVisible = feed.visible !== false;

        const row = document.createElement('div');
        row.style.cssText = 'border-bottom:1px solid var(--border);padding:6px 0;';

        // Feed name row
        const nameRow = document.createElement('div');
        nameRow.style.cssText = 'display:flex;align-items:center;padding:2px 6px;font-weight:600;';
        nameRow.innerHTML = `<span style="flex:1;">${escHtml(feed.name)}</span>`;
        row.appendChild(nameRow);

        // Fetch toggle
        const fetchBtn = document.createElement('button');
        fetchBtn.className = 'clickable-item';
        fetchBtn.style.cssText = 'padding:4px 6px;font-size:11px;';
        fetchBtn.innerHTML = `<span style="flex:1;color:var(--text-muted);">Fetch articles</span><span style="font-weight:bold;">${isEnabled ? '[ON]' : '[OFF]'}</span>`;
        fetchBtn.onclick = () => {
            state.feeds[i].enabled = !isEnabled;
            localStorage.setItem('rss_feeds_cfg', JSON.stringify(state.feeds));
            renderSettingsFeedToggles();
            forceRefresh();
        };
        row.appendChild(fetchBtn);

        // Visibility toggle (only matters if enabled)
        const visBtn = document.createElement('button');
        visBtn.className = 'clickable-item';
        visBtn.style.cssText = 'padding:4px 6px;font-size:11px;';
        visBtn.innerHTML = `<span style="flex:1;color:var(--text-muted);">Show in home feed</span><span style="font-weight:bold;">${isVisible ? '[ON]' : '[OFF]'}</span>`;
        visBtn.onclick = () => {
            state.feeds[i].visible = !isVisible;
            localStorage.setItem('rss_feeds_cfg', JSON.stringify(state.feeds));
            renderSettingsFeedToggles();
            // Refresh home view without re-fetching
            const cached = JSON.parse(localStorage.getItem('rss_feed_cache') || '[]');
            const visNames = new Set(state.feeds.filter(f => f.enabled !== false && f.visible !== false).map(f => f.name));
            const vis = cached.filter(a => visNames.has(a.source));
            if (state.currentView === 'home' || true) {
                renderArticles(vis, document.getElementById('home-list'), false);
            }
        };
        row.appendChild(visBtn);
        c.appendChild(row);
    });
}

function resetApp() {
    if (confirm('Factory reset? All saved feeds and cache will be deleted.')) {
        localStorage.clear();
        window.location.reload();
    }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function formatTimeAgo(ts) {
    if (!ts) return '';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60)   return 'Just now';
    const m = Math.floor(s / 60);
    if (m < 60)   return m + 'm ago';
    const h = Math.floor(s / 3600);
    if (h < 24)   return h + 'h ago';
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

// ── D-PAD FOCUS ───────────────────────────────────────────────────────────────
function moveFocus(dir) {
    const root = state.optionsOpen
        ? document.getElementById('options-overlay')
        : document.querySelector('.view.active');
    if (!root) return;
    const els = Array.from(root.querySelectorAll('.clickable-item,input,select')).filter(e => e.offsetParent !== null);
    if (!els.length) return;
    let idx = els.indexOf(document.activeElement);
    if (idx < 0) idx = dir === 1 ? -1 : els.length;
    idx = dir === 1 ? Math.min(idx + 1, els.length - 1) : Math.max(idx - 1, 0);
    els[idx].focus();
    els[idx].scrollIntoView({ block: 'nearest' });
}

// ── KEY BINDINGS ──────────────────────────────────────────────────────────────
function setupKeyBindings() {
    window.addEventListener('keydown', e => {

        // LSK = Escape
        if (e.key === 'Escape') {
            e.preventDefault();
            if (state.optionsOpen)             { closeOptions(); return; }
            if (state.currentView === 'reader'){ refreshCurrentArticle(); return; }  // LSK in reader = refresh
            if (state.currentView === 'settings'){ applySettings(); switchView('home'); return; }
            openOptions();
            return;
        }

        // Enter / Center key
        if (e.key === 'Enter') {
            if (state.currentView === 'reader') {
                e.preventDefault();
                if (state.activeArticleUrl) window.open(state.activeArticleUrl, '_blank');
                return;
            }
            if (document.activeElement && typeof document.activeElement.click === 'function') {
                e.preventDefault();
                document.activeElement.click();
            }
            return;
        }

        // RSK = SoftRight / Back (handled below via 'back' event), also F2 on some devices
        if (e.key === 'F2' || e.key === 'SoftRight') {
            e.preventDefault();
            handleBack();
            return;
        }

        // Arrow navigation
        const isDown = e.key === 'ArrowDown' || e.key === '8';
        const isUp   = e.key === 'ArrowUp'   || e.key === '2';
        if (isDown || isUp) {
            if (!state.optionsOpen && state.currentView === 'reader') {
                document.getElementById('view-reader').scrollTop += isDown ? 80 : -80;
            } else {
                moveFocus(isDown ? 1 : -1);
            }
            e.preventDefault();
            return;
        }

        // Number key shortcuts
        if (!state.optionsOpen) {
            // 5 = open channel list from anywhere (except reader)
            if (e.key === '5' && state.currentView !== 'reader') {
                e.preventDefault();
                switchView('channels');
                return;
            }
        }
    });

    // RSK = hardware back event (KaiOS / Cloud Phone)
    window.addEventListener('back', e => {
        e.preventDefault();
        handleBack();
    });
}

function handleBack() {
    if (state.optionsOpen) { closeOptions(); return; }
    goBack();
}
