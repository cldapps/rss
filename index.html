<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant RSS Reader</title>
    <style>
        /* Modern Editorial & Custom Variables */
        :root {
            --bg: #fdfdfd;
            --surface: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #5a5a5a;
            --accent-pill: #f0f0f0;
            --accent-pill-text: #444444;
            --focus-outline: #222222;
            --focus-bg: #f5f5f5;
            --border: #e5e5e5;
        }

        /* Themes */
        body.theme-light {
            --bg: #fdfdfd; --surface: #ffffff; --text-main: #1a1a1a; --text-muted: #5a5a5a; --accent-pill: #f0f0f0; --accent-pill-text: #444444; --border: #e5e5e5; --focus-bg: #f5f5f5; --focus-outline: #222222;
        }
        body.theme-dark {
            --bg: #121212; --surface: #1d1d1d; --text-main: #e5e5e5; --text-muted: #999999; --accent-pill: #2a2a2a; --accent-pill-text: #cccccc; --border: #2c2c2c; --focus-bg: #262626; --focus-outline: #ffffff;
        }
        body.theme-sepia {
            --bg: #f5efe3; --surface: #fbf6ec; --text-main: #433422; --text-muted: #70604c; --accent-pill: #ebdcc5; --accent-pill-text: #5c4732; --border: #e6d7bf; --focus-bg: #ede2cf; --focus-outline: #433422;
        }
        body.theme-oled {
            --bg: #000000; --surface: #000000; --text-main: #ffffff; --text-muted: #888888; --accent-pill: #222222; --accent-pill-text: #aaaaaa; --border: #1a1a1a; --focus-bg: #111111; --focus-outline: #ffffff;
        }

        /* Fonts */
        body.font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body.font-serif { font-family: "Keeply Serif", Georgia, Cambria, "Times New Roman", serif; }
        body.font-mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }

        body.size-small { font-size: 14px; }
        body.size-medium { font-size: 17px; }
        body.size-large { font-size: 21px; }

        body {
            margin: 0;
            padding: 0 0 45px 0;
            background: var(--bg);
            color: var(--text-main);
            box-sizing: border-box;
            line-height: 1.4;
        }

        .view {
            display: none;
            padding: 12px;
        }
        .view.active {
            display: block;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 5px 0 15px 0;
            letter-spacing: -0.5px;
        }
        h2 {
            font-size: 1.05rem;
            font-weight: 600;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        /* Interactive Elements & D-Pad focus configurations */
        input, select, button, .clickable-item {
            font-size: inherit;
            font-family: inherit;
            color: inherit;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 0px; /* Minimalist clean edges */
            box-sizing: border-box;
            width: 100%;
            margin-bottom: 10px;
            text-align: left;
            display: block;
            text-decoration: none;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px;
            margin-bottom: 6px;
        }
        .checkbox-container input {
            width: auto;
            margin: 0 10px 0 0;
        }

        input:focus, select:focus, button:focus, .clickable-item:focus, .checkbox-container:focus-within {
            outline: 2px solid var(--focus-outline);
            background-color: var(--focus-bg) !important;
        }

        /* Elegant Minimalist News Cards */
        .news-card {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            margin-bottom: 0;
            cursor: pointer;
            border-top: none; border-left: none; border-right: none;
        }
        .news-meta-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.72rem;
        }
        .feed-badge {
            background: var(--accent-pill);
            color: var(--accent-pill-text);
            padding: 2px 6px;
            font-weight: 600;
            margin-right: 8px;
            letter-spacing: 0.3px;
        }
        .news-time {
            color: var(--text-muted);
        }
        .news-title {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95em;
            line-height: 1.3;
        }
        .news-snippet {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.4;
        }

        /* Article Reader View */
        .article-meta {
            font-size: 0.78em;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        .article-content p {
            line-height: 1.6;
            margin-bottom: 1.3em;
        }

        /* Options Backdrop Modal Menu Overlays */
        .options-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 36px;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            justify-content: flex-end;
            flex-direction: column;
        }
        .options-content {
            background: var(--surface);
            padding: 15px;
            border-top: 2px solid var(--focus-outline);
        }
        .options-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Native Feature Phone Navigation Bar Layout */
        .softkey-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 36px;
            background: #111111;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            font-family: -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 600;
            z-index: 3000;
        }
        .softkey-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 5px;
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body class="theme-light font-sans size-medium">

    <!-- VIEW 1: HOME TIMELINE (MIXED FEEDS) -->
    <div id="view-home" class="view active">
        <h1>Timeline</h1>
        <div id="timeline-list"></div>
    </div>

    <!-- VIEW 2: BROWSE INDIVIDUAL CHANNELS -->
    <div id="view-channels" class="view">
        <h1>Channels</h1>
        <div id="channels-list"></div>
    </div>

    <!-- VIEW 3: SINGLE CHANNEL HEADLINES -->
    <div id="view-headlines" class="view">
        <h1 id="headlines-title">Channel</h1>
        <div id="headlines-list"></div>
    </div>

    <!-- VIEW 4: ARTICLE READER -->
    <div id="view-reader" class="view">
        <h1 id="reader-title">Loading...</h1>
        <div class="article-meta" id="reader-meta"></div>
        <div class="article-content" id="reader-content"></div>
    </div>

    <!-- VIEW 5: SETTINGS (INCLUDES ADDER & CHOSEN MIX MIXED CONFIG) -->
    <div id="view-settings" class="view">
        <h1>Settings</h1>
        
        <label for="setting-theme">Theme</label>
        <select id="setting-theme" onchange="applySettings()">
            <option value="theme-light">Light Editorial</option>
            <option value="theme-dark">Dark Mode</option>
            <option value="theme-sepia">Sepia Book</option>
            <option value="theme-oled">OLED Black</option>
        </select>

        <label for="setting-font">Font Style</label>
        <select id="setting-font" onchange="applySettings()">
            <option value="font-sans">Sans-Serif</option>
            <option value="font-serif">Serif</option>
            <option value="font-mono">Monospace</option>
        </select>

        <label for="setting-size">Text Size</label>
        <select id="setting-size" onchange="applySettings()">
            <option value="size-small">Small</option>
            <option value="size-medium">Medium</option>
            <option value="size-large">Large</option>
        </select>

        <h2>Include in Timeline</h2>
        <div id="mixed-toggle-container"></div>

        <h2>Add Custom RSS Feed</h2>
        <input type="text" id="custom-name" placeholder="Channel Name">
        <input type="url" id="custom-url" placeholder="https://site.com/rss">
        <button onclick="addNewFeed()">+ Save Channel</button>
        
        <button onclick="resetFeedsToDefault()" style="background:#8b0000; color:white; margin-top:15px; text-align:center;">Reset Defaults</button>
    </div>

    <!-- OPTIONS CONTEXT OVERLAY MODAL -->
    <div id="optionsModal" class="options-modal" onclick="closeOptionsModal()">
        <div class="options-content" onclick="event.stopPropagation()">
            <div class="options-title">Options</div>
            <button class="clickable-item" onclick="handleOptionsSelection(1)">1. Refresh Timeline</button>
            <button class="clickable-item" onclick="handleOptionsSelection(2)">2. Browse Channels</button>
        </div>
    </div>

    <!-- HARDWARE KEY INTERFACE BAR -->
    <div class="softkey-bar">
        <button class="softkey-btn" id="lsk-label" onclick="handleLSKClick()">Menu</button>
        <div style="font-size:11px; color:#888;">D-Pad Selection</div>
        <button class="softkey-btn" id="rsk-label" onclick="handleRSKClick()">Options</button>
    </div>

    <script>
        // Switch to AllOrigins raw scraper proxy to prevent CORS/Cloudflare blocks on NYT & Prothom Alo
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        
        const defaultFeeds = [
            { name: "BBC News", url: "https://feeds.bbci.co.uk/news/rss.xml", includeInMixed: true },
            { name: "NY Times", url: "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml", includeInMixed: true },
            { name: "Prothom Alo", url: "https://www.prothomalo.com/feed/", includeInMixed: true },
            { name: "Daily Star", url: "https://www.thedailystar.net/frontpage/rss.xml", includeInMixed: true }
        ];

        let state = {
            feeds: [],
            currentView: "home",
            activeFeedUrl: "",
            activeArticleUrl: "",
            settings: { theme: "theme-light", font: "font-sans", size: "size-medium" }
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            setupPhysicalKeyBindings();
            loadMixedTimeline();
        });

        function loadSavedData() {
            const savedFeeds = localStorage.getItem('rss_feeds_v2');
            const savedSettings = localStorage.getItem('rss_settings_v2');
            
            state.feeds = savedFeeds ? JSON.parse(savedFeeds) : [...defaultFeeds];
            if(savedSettings) state.settings = JSON.parse(savedSettings);
            
            document.getElementById('setting-theme').value = state.settings.theme;
            document.getElementById('setting-font').value = state.settings.font;
            document.getElementById('setting-size').value = state.settings.size;
            
            applySettingsToDOM();
        }

        function applySettings() {
            state.settings.theme = document.getElementById('setting-theme').value;
            state.settings.font = document.getElementById('setting-font').value;
            state.settings.size = document.getElementById('setting-size').value;
            localStorage.setItem('rss_settings_v2', JSON.stringify(state.settings));
            applySettingsToDOM();
        }

        function applySettingsToDOM() {
            document.body.className = `${state.settings.theme} ${state.settings.font} ${state.settings.size}`;
        }

        function saveFeedsToStorage() {
            localStorage.setItem('rss_feeds_v2', JSON.stringify(state.feeds));
        }

        function resetFeedsToDefault() {
            if(confirm("Reset all channel profiles?")) {
                state.feeds = [...defaultFeeds];
                saveFeedsToStorage();
                renderSettingsLists();
                switchView('home');
                loadMixedTimeline();
            }
        }

        function renderSettingsLists() {
            // Include In Mixed timeline checks
            const container = document.getElementById('mixed-toggle-container');
            container.innerHTML = "";
            state.feeds.forEach((feed, index) => {
                const div = document.createElement('div');
                div.className = "checkbox-container";
                div.tabIndex = 0;
                div.innerHTML = `
                    <input type="checkbox" id="chk-${index}" ${feed.includeInMixed ? 'checked' : ''}>
                    <label for="chk-${index}">${feed.name}</label>
                `;
                div.onclick = () => {
                    const chk = div.querySelector('input');
                    chk.checked = !chk.checked;
                    state.feeds[index].includeInMixed = chk.checked;
                    saveFeedsToStorage();
                };
                div.onkeydown = (e) => {
                    if(e.key === 'Enter') {
                        e.preventDefault();
                        div.onclick();
                    }
                };
                container.appendChild(div);
            });
        }

        function addNewFeed() {
            const nameInput = document.getElementById('custom-name');
            const urlInput = document.getElementById('custom-url');
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();

            if(!name || !url) return alert("Fill in all parameters.");

            state.feeds.push({ name, url, includeInMixed: true });
            saveFeedsToStorage();
            renderSettingsLists();
            
            nameInput.value = "";
            urlInput.value = "";
            alert("Channel added successfully.");
        }

        function switchView(viewName) {
            state.currentView = viewName;
            closeOptionsModal();
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            if(viewName === 'settings') renderSettingsLists();
            if(viewName === 'channels') renderChannelsView();
            
            const target = document.getElementById(`view-${viewName}`).querySelector('input, select, button, .clickable-item');
            if(target) target.focus();
            
            updateSoftkeyLabels();
        }

        // Home View: Multi-feed aggregator pipeline 
        async function loadMixedTimeline() {
            const listContainer = document.getElementById('timeline-list');
            listContainer.innerHTML = "<div style='text-align:center; padding:30px; font-size:14px; color:var(--text-muted);'>Updating collective timeline stream...</div>";
            
            const activeFeeds = state.feeds.filter(f => f.includeInMixed);
            if(activeFeeds.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center; padding:20px;'>No channels selected for timeline. Go to Settings.</p>";
                return;
            }

            let masterItems = [];
            const promises = activeFeeds.map(async (feed) => {
                try {
                    const response = await fetch(proxyUrl + encodeURIComponent(feed.url));
                    if(!response.ok) return;
                    const xmlText = await response.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    const items = xmlDoc.querySelectorAll("item");
                    
                    items.forEach(item => {
                        const title = item.querySelector("title")?.textContent || "Untitled";
                        const link = item.querySelector("link")?.textContent || "";
                        let desc = item.querySelector("description")?.textContent || "";
                        let pDate = item.querySelector("pubDate")?.textContent || "";
                        
                        desc = desc.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 95);
                        let timestamp = pDate ? Date.parse(pDate) : 0;

                        masterItems.push({ title, link, desc, pubDate: pDate, timestamp, feedName: feed.name });
                    });
                } catch(e) { console.error("Error reading: " + feed.name, e); }
            });

            await Promise.allSettled(promises);
            masterItems.sort((a, b) => b.timestamp - a.timestamp);
            
            listContainer.innerHTML = "";
            if(masterItems.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center;'>Unable to retrieve network data streams.</p>";
                return;
            }

            // Limit timeline index loop execution to protect device memory constraints
            masterItems.slice(0, 35).forEach(item => {
                const card = document.createElement('div');
                card.className = "news-card clickable-item";
                card.tabIndex = 0;
                
                let displayDate = "";
                if(item.pubDate) {
                    try { displayDate = new Date(item.pubDate).toLocaleDateString([], {month:'short', day:'numeric'}); } catch(e) { displayDate = ""; }
                }

                card.innerHTML = `
                    <div class="news-meta-row">
                        <span class="feed-badge">${item.feedName}</span>
                        <span class="news-time">${displayDate}</span>
                    </div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-snippet">${item.desc}...</div>
                `;
                card.onclick = () => loadFullArticle(item.link, item.title);
                card.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); loadFullArticle(item.link, item.title); } };
                listContainer.appendChild(card);
            });
        }

        function renderChannelsView() {
            const container = document.getElementById('channels-list');
            container.innerHTML = "";
            state.feeds.forEach(feed => {
                const btn = document.createElement('button');
                btn.className = "clickable-item";
                btn.innerText = feed.name;
                btn.onclick = () => loadChannelHeadlines(feed.url, feed.name);
                container.appendChild(btn);
            });
        }

        async function loadChannelHeadlines(url, name) {
            state.activeFeedUrl = url;
            switchView('headlines');
            document.getElementById('headlines-title').innerText = name;
            const container = document.getElementById('headlines-list');
            container.innerHTML = "<div style='text-align:center; padding:30px;'>Opening channel data...</div>";

            try {
                const response = await fetch(proxyUrl + encodeURIComponent(url));
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                container.innerHTML = "";
                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent || "Untitled";
                    const link = item.querySelector("link")?.textContent || "";
                    let desc = item.querySelector("description")?.textContent || "";
                    desc = desc.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 95);

                    const card = document.createElement('div');
                    card.className = "news-card clickable-item";
                    card.tabIndex = 0;
                    card.innerHTML = `
                        <div class="news-title">${title}</div>
                        <div class="news-snippet">${desc}...</div>
                    `;
                    card.onclick = () => loadFullArticle(link, title);
                    card.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); loadFullArticle(link, title); } };
                    container.appendChild(card);
                });
            } catch(e) {
                container.innerHTML = "<p style='color:red;'>Could not load channel feed.</p>";
            }
        }

        async function loadFullArticle(url, title) {
            state.activeArticleUrl = url;
            const previousView = state.currentView; 
            switchView('reader');
            
            // Set dynamic memory trail context parameter onto left navigation node back button
            document.getElementById('lsk-label').setAttribute('data-backview', previousView);
            
            document.getElementById('reader-title').innerText = title;
            document.getElementById('reader-meta').innerText = `Source: ${url}`;
            const contentContainer = document.getElementById('reader-content');
            contentContainer.innerHTML = "<div style='text-align:center; padding:30px;'>Scraping clean article body text...</div>";

            try {
                const response = await fetch(proxyUrl + encodeURIComponent(url));
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, "text/html");

                const targetArea = doc.querySelector('article, main, [class*="article-body"], [class*="story-body"], .entry-content');
                let processedHTML = "";

                if(targetArea) {
                    const nodes = targetArea.querySelectorAll('p, h2, h3');
                    nodes.forEach(n => {
                        if(n.textContent.trim().length > 15) {
                            processedHTML += `<p>${n.textContent.trim()}</p>`;
                        }
                    });
                }

                if(!processedHTML || processedHTML.length < 200) {
                    processedHTML = "";
                    doc.querySelectorAll('p').forEach(p => {
                        if(p.textContent.trim().length > 35) {
                            processedHTML += `<p>${p.textContent.trim()}</p>`;
                        }
                    });
                }

                contentContainer.innerHTML = processedHTML || "<p>Failed to load clean text extraction.</p>";
            } catch (err) {
                contentContainer.innerHTML = "<p>Network connection failed parsing elements.</p>";
            }
        }

        // Overlay Modal Operations
        function openOptionsModal() {
            document.getElementById('optionsModal').style.display = "flex";
            const clearBtn = document.getElementById('optionsModal').querySelector('.clickable-item');
            if(clearBtn) clearBtn.focus();
        }

        function closeOptionsModal() {
            document.getElementById('optionsModal').style.display = "none";
        }

        function handleOptionsSelection(optionIndex) {
            closeOptionsModal();
            if(optionIndex === 1) {
                loadMixedTimeline();
                switchView('home');
            } else if(optionIndex === 2) {
                switchView('channels');
            }
        }

        function updateSoftkeyLabels() {
            const lsk = document.getElementById('lsk-label');
            const rsk = document.getElementById('rsk-label');

            if (state.currentView === "home") {
                lsk.innerText = "Settings";
                rsk.innerText = "Options";
            } else if (state.currentView === "channels") {
                lsk.innerText = "Back";
                rsk.innerText = "";
            } else if (state.currentView === "headlines") {
                lsk.innerText = "Back";
                rsk.innerText = "Refresh";
            } else if (state.currentView === "reader") {
                lsk.innerText = "Back";
                rsk.innerText = "External";
            } else if (state.currentView === "settings") {
                lsk.innerText = "Back";
                rsk.innerText = "";
            }
        }

        function handleLSKClick() {
            if (state.currentView === "home") {
                switchView('settings');
            } else if (state.currentView === "channels" || state.currentView === "settings") {
                switchView('home');
            } else if (state.currentView === "headlines") {
                switchView('channels');
            } else if (state.currentView === "reader") {
                const backTarget = document.getElementById('lsk-label').getAttribute('data-backview') || 'home';
                switchView(backTarget);
            }
        }

        function handleRSKClick() {
            if (state.currentView === "home") {
                openOptionsModal();
            } else if (state.currentView === "headlines") {
                loadChannelHeadlines(state.activeFeedUrl, document.getElementById('headlines-title').innerText);
            } else if (state.currentView === "reader") {
                window.open(state.activeArticleUrl, '_blank');
            }
        }

        function setupPhysicalKeyBindings() {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'SoftLeft' || e.key === 'F1' || e.keyCode === 118) {
                    e.preventDefault();
                    handleLSKClick();
                }
                if (e.key === 'SoftRight' || e.key === 'F2' || e.keyCode === 119) {
                    e.preventDefault();
                    handleRSKClick();
                }
                // Hotkeys 1 & 2 when inside options context overlay modal
                if(document.getElementById('optionsModal').style.display === "flex") {
                    if(e.key === '1') { e.preventDefault(); handleOptionsSelection(1); }
                    if(e.key === '2') { e.preventDefault(); handleOptionsSelection(2); }
                }
            });
        }
    </script>
</body>
</html>
